name: DOC-007 - Validate Links and References

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate Links
        run: |
          python scripts/validate_links.py
