name: DOC-001 - Create Document

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Document Title"
        required: true
        type: string

      document_type:
        description: "Document Type"
        required: true
        type: choice
        options:
          - api
          - architecture
          - runbook
          - troubleshooting
          - user-guide

      owner:
        description: "Document Owner"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  create-document:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate document
        shell: bash
        run: |

          FILE_NAME=$(echo "${{ inputs.title }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-zA-Z0-9 ]//g' \
            | tr ' ' '-')

          case "${{ inputs.document_type }}" in
            api)
              DESTINATION="docs/api"
              ;;
            architecture)
              DESTINATION="docs/architecture"
              ;;
            runbook)
              DESTINATION="docs/runbooks"
              ;;
            troubleshooting)
              DESTINATION="docs/troubleshooting"
              ;;
            user-guide)
              DESTINATION="docs/user-guides"
              ;;
          esac

          mkdir -p "$DESTINATION"

          cp "templates/${{ inputs.document_type }}-template.md" \
             "$DESTINATION/$FILE_NAME.md"

          sed -i "s/{{TITLE}}/${{ inputs.title }}/g" "$DESTINATION/$FILE_NAME.md"
          sed -i "s/{{OWNER}}/${{ inputs.owner }}/g" "$DESTINATION/$FILE_NAME.md"
          sed -i "s/{{AUTHOR}}/${{ github.actor }}/g" "$DESTINATION/$FILE_NAME.md"
          sed -i "s/{{DATE}}/$(date +%F)/g" "$DESTINATION/$FILE_NAME.md"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "DOC-001: Create ${{ inputs.title }}"
          branch: "docs/create-${{ github.run_number }}"
          title: "DOC-001: Create '${{ inputs.title }}'"
          body: |
            ## New Documentation

            This document was automatically generated by the **DOC-001 Create Document** workflow.

            **Title:** ${{ inputs.title }}

            **Type:** ${{ inputs.document_type }}

            **Owner:** ${{ inputs.owner }}

            **Author:** ${{ github.actor }}

            Please review before merging.
