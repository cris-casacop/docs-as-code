name: DOC-002 - Update Document

on:
  workflow_dispatch:
    inputs:
      document_type:
        description: "Document Type"
        required: true
        type: choice
        options:
          - api
          - architecture
          - runbook
          - troubleshooting
          - user-guide

      document_name:
        description: "Document Filename (without .md)"
        required: true
        type: string

      update_summary:
        description: "Update Summary"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-document:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Display repository structure
        run: |
          echo "Repository contents:"
          pwd
          ls -la
          echo ""
          echo "Docs folder:"
          find docs

      - name: Locate document
        run: |
          FILE="docs/${{ inputs.document_type }}/${{ inputs.document_name }}.md"

          echo "Looking for:"
          echo "$FILE"

          if [ ! -f "$FILE" ]; then
            echo "ERROR: Document not found."
            exit 1
          fi

          echo "SUCCESS: Document found."

      - name: Update document
        run: |
          FILE="docs/${{ inputs.document_type }}/${{ inputs.document_name }}.md"

          echo "" >> "$FILE"
          echo "<!-- Updated: $(date +%F) by ${{ github.actor }} -->" >> "$FILE"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/

          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "DOC-002: ${{ inputs.update_summary }}"
            git push
          fi
