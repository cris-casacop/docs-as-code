name: DOC-002 - Update Document

on:
  workflow_dispatch:
    inputs:
      document_type:
        description: "Document Type"
        required: true
        type: choice
        options:
          - api
          - architecture
          - runbook
          - troubleshooting
          - user-guide

      document_name:
        description: "Document Filename (without .md)"
        required: true
        type: string

      update_summary:
        description: "Summary of Update"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-document:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Locate document
        run: |
          FILE="docs/${{ inputs.document_type }}/${{ inputs.document_name }}.md"

          echo "Looking for $FILE"

          if [ ! -f "$FILE" ]; then
            echo "Document not found!"
            exit 1
          fi

          echo "Document found."

      - name: Update document metadata
        run: |
          FILE="docs/${{ inputs.document_type }}/${{ inputs.document_name }}.md"

          CURRENT_VERSION=$(sed -n 's/^version: //p' "$FILE")

          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)

          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="$MAJOR.$NEW_MINOR"

          sed -i "s/^last_updated:.*/last_updated: $(date +%F)/" "$FILE"
          sed -i "s/^updated_by:.*/updated_by: ${{ github.actor }}/" "$FILE"
          sed -i "s/^version:.*/version: $NEW_VERSION/" "$FILE"

          echo "Updated metadata:"
          grep -E "last_updated|updated_by|version" "$FILE"

      - name: Commit and push document
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/

          git diff --cached --quiet || git commit -m "DOC-002: ${{ inputs.update_summary }}"

          git push
