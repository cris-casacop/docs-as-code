name: DOC-002 - Update Document

on:
  workflow_dispatch:
    inputs:
      document_type:
        description: "Document Type"
        required: true
        type: choice
        options:
          - api
          - architecture
          - runbook
          - troubleshooting
          - user-guide

      document_name:
        description: "Document Filename (without .md)"
        required: true
        type: string

      update_summary:
        description: "Summary of Update"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-document:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Locate document
        run: |
          FILE="docs/${{ inputs.document_type }}/${{ inputs.document_name }}.md"

          echo "Looking for:"
          echo "$FILE"

          if [ -f "$FILE" ]; then
            echo "Document found."
          else
            echo "Document not found!"
            exit 1
          fi
