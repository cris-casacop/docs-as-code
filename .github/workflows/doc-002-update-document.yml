name: DOC-002 - Update Document

on:
  workflow_dispatch:
    inputs:
      document_type:
        description: "Document Type"
        required: true
        type: choice
        options:
          - api
          - architecture
          - runbook
          - troubleshooting
          - user-guide

      document_name:
        description: "Document Filename (without .md)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-document:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Locate document
        run: |
          FILE="docs/${{ inputs.document_type }}/${{ inputs.document_name }}.md"

          echo "Looking for: $FILE"

          if [ ! -f "$FILE" ]; then
            echo "❌ Document not found."
            exit 1
          fi

          echo "✅ Document found."

      - name: Update last_updated
        run: |
          FILE="docs/${{ inputs.document_type }}/${{ inputs.document_name }}.md"

          sed -i "s/^last_updated:.*/last_updated: $(date +%F)/" "$FILE"

          echo "Updated metadata:"
          grep "^last_updated:" "$FILE"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "DOC-002: Updated last_updated for ${{ inputs.document_name }}"
            git push
          fi
