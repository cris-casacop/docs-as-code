name: DOC-002 - Update Document

on:
  workflow_dispatch:
    inputs:
      document_type:
        description: "Document Type"
        required: true
        type: choice
        options:
          - api
          - architecture
          - runbook
          - troubleshooting
          - user-guide

      document_name:
        description: "Document Filename (without .md)"
        required: true
        type: string

      update_summary:
        description: "Summary of Update"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-document:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Locate document
        run: |
          FILE="docs/${{ inputs.document_type }}/${{ inputs.document_name }}.md"

          echo "Current repository structure:"
          find docs

          echo ""
          echo "Looking for:"
          echo "$FILE"

          if grep -q "^## Update History" "$FILE"; then
            awk -v entry="- $(date +%F) - ${{ inputs.update_summary }} (updated by ${{ github.actor }})" '
            /^## Update History$/ {
                print
                getline
                print
                print entry
                next
            }
            { print }
            ' "$FILE" > temp.md
          
            mv temp.md "$FILE"
          
          else
            cat >> "$FILE" <<EOF
          
          ---
          
          ## Update History
          
          - $(date +%F) - ${{ inputs.update_summary }} (updated by ${{ github.actor }})
          EOF
          fi

            echo "Document updated."
          else
            echo "❌ Document not found!"
            exit 1
          fi

      - name: Commit and push updated document
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/

          git diff --cached --quiet || git commit -m "DOC-002: ${{ inputs.update_summary }}"

          git push
