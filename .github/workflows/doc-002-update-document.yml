name: DOC-002 - Update Document

on:
  workflow_dispatch:
    inputs:
      document_type:
        description: "Document Type"
        required: true
        type: choice
        options:
          - api
          - architecture
          - runbook
          - troubleshooting
          - user-guide

      document_name:
        description: "Document Filename (without .md)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Debug repository
        run: |
          pwd

          echo ""
          echo "Current directory:"
          ls -la

          echo ""
          echo "Docs:"
          find docs

          FILE="docs/${{ inputs.document_type }}/${{ inputs.document_name }}.md"

          echo ""
          echo "FILE=$FILE"

          echo ""
          echo "Checking with ls:"
          ls -l "$FILE" || true

          echo ""
          echo "Checking with test:"
          if test -f "$FILE"; then
            echo "FOUND"
          else
            echo "NOT FOUND"
          fi
