name: DOC-001 - Create Document

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Document Title"
        required: true
        type: string

      document_type:
        description: "Document Type"
        required: true
        type: choice
        options:
          - api
          - architecture
          - runbook
          - troubleshooting
          - user-guide

      owner:
        description: "Document Owner"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-document:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Create document
        run: |
          # Create destination folder
          mkdir -p docs/${{ inputs.document_type }}

          # Convert title to filename
          FILE_NAME=$(echo "${{ inputs.title }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')

          # Full path of the new document
          FILE="docs/${{ inputs.document_type }}/$FILE_NAME.md"

          # Copy the appropriate template
          cp templates/${{ inputs.document_type }}-template.md "$FILE"

          # Replace placeholders
          sed -i "s/{{TITLE}}/${{ inputs.title }}/g" "$FILE"
          sed -i "s/{{OWNER}}/${{ inputs.owner }}/g" "$FILE"
          sed -i "s/{{AUTHOR}}/${{ github.actor }}/g" "$FILE"
          sed -i "s/{{DATE}}/$(date +%F)/g" "$FILE"

          echo "Document created:"
          echo "$FILE"

      - name: Commit and push document
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/

          git diff --cached --quiet || git commit -m "DOC-001: Create ${{ inputs.title }}"

          git push
