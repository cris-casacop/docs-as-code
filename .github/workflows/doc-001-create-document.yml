name: DOC-001 - Create Document

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Document Title"
        required: true
        type: string

      document_type:
        description: "Document Type"
        required: true
        type: choice
        options:
          - api
          - architecture
          - runbook
          - troubleshooting
          - user-guide

      owner:
        description: "Document Owner"
        required: true
        type: string

jobs:
  create-document:
    runs-on: ubuntu-latest

    steps:
      - name: Display Inputs
        run: |
          echo "Title: ${{ inputs.title }}"
          echo "Type: ${{ inputs.document_type }}"
          echo "Owner: ${{ inputs.owner }}"
