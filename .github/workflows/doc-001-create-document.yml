name: DOC-001 - Create Document

permissions:
  content: write

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Document Title"
        required: true
        type: string

      document_type:
        description: "Document Type"
        required: true
        type: choice
        options:
          - api
          - architecture
          - runbook
          - troubleshooting
          - user-guide

      owner:
        description: "Document Owner"
        required: true
        type: string

jobs:
  create-document:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Create document
        run: |
          mkdir -p docs/${{ inputs.document_type }}

          FILE_NAME=$(echo "${{ inputs.title }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')

          cat > docs/${{ inputs.document_type }}/$FILE_NAME.md <<EOF
          ---
          title: ${{ inputs.title }}
          owner: ${{ inputs.owner }}
          author: ${{ github.actor }}
          status: Draft
          created: $(date +%F)
          ---

          # ${{ inputs.title }}

          ## Purpose

          ## Content
          EOF

          echo "Document created successfully."
          ls -R docs

      - name: Commit generated document
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
    
        git add docs/
    
        git commit -m "DOC-001: Create ${{ inputs.title }}"
    
        git push
