name: DOC-001 - Create Document

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Document Title"
        required: true
        type: string

      document_type:
        description: "Document Type"
        required: true
        type: choice
        options:
          - api
          - architecture
          - runbook
          - troubleshooting
          - user-guide

      owner:
        description: "Document Owner"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-document:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Create document
        run: |
          mkdir -p docs/${{ inputs.document_type }}
      
          FILE_NAME=$(echo "${{ inputs.title }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')
      
          cp templates/runbook-template.md docs/runbooks/database-backup.md
          ---
          title: ${{ inputs.title }}
          owner: ${{ inputs.owner }}
          author: ${{ github.actor }}
          ---
      
          # ${{ inputs.title }}
      
          ## Purpose
      
          ## Content
          EOF
      
          echo "Created:"
          find docs

      - name: Commit and push document
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/

          git diff --cached --quiet || git commit -m "DOC-001: Create ${{ inputs.title }}"

          git push
